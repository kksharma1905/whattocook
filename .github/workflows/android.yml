name: Build Android Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Sync Capacitor assets
        run: npx cap sync android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/whattocook-release.jks

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/whattocook-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build debug APK (for direct install)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/whattocook-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: WhatToCook-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload APK (direct install)
        uses: actions/upload-artifact@v4
        with:
          name: WhatToCook-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
